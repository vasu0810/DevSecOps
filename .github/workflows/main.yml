name: AI-DevSecOps-Final-Gate

# Controls when the workflow will run
on:
  push:
    branches: [ "main" ]  # Runs every time you push to the main branch
  pull_request:
    branches: [ "main" ]

jobs:
  security-enforcement:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    steps:
      # 1. Pulls your source code from GitHub into the runner
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      # 2. Builds and starts your Docker-Compose infrastructure
      - name: 2. Start AI & OPA Infrastructure
        run: |
          docker compose up -d --build
          echo "Infrastructure is booting up..."

      # 3. Critical: Wait for Python and OPA services to be healthy
      - name: 3. Wait for Services
        run: sleep 20

      - name: 4. Execute Automatic AI Risk Enforcement
        run: |
          pip install requests
          python scanner.py  # This script now "finds out" if it is positive or negative

      # 5. This step ONLY runs if the Gatekeeper returns 'ALLOW' (200 OK)
      - name: 5. Deploy to Production
        if: success()
        run: |
          echo "🚀 AI Verdict: ALLOWED"
          echo "Proceeding with Production Deployment..."

      # 6. This step now runs ALWAYS to show the final gatekeeper status
      - name: 6. Final Gatekeeper Summary
        if: always()
        run: |
          echo "📊 Finalizing Security Audit..."
          echo "Gatekeeper evaluation is complete. Check logs for details."