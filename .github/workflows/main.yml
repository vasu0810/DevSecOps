name: AI-DevSecOps-Final-Gate

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  security-enforcement:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. Install Dependencies
        run: |
          # Ensure all core AI and API libraries are present
          pip install fastapi uvicorn requests scikit-learn shap pandas PyYAML

      - name: 4. Start Gatekeeper API
        # Starts the API server in the background so the scanner can reach it
        run: |
          python main_gatekeeper_api.py &
          sleep 15 # Wait for "Application startup complete"

      - name: 5. Execute AI Risk Enforcement
        env:
          GITHUB_REF: ${{ github.ref }}
        run: |
          # This script triggers the hybrid evaluation
          # It will exit with code 1 if a BLOCK verdict is issued
          python scanner.py

      - name: 6. Final Gatekeeper Summary
        if: always()
        run: |
          echo "📊 Security evaluation complete."
          # Display the audit log for transparency in the GitHub console
          cat logs/gatekeeper_audit.log || echo "No logs found."