# Stage 10: Deterministic Governance Policies
policies:
  - name: "Production Exposure Block"
    condition: "environment == 'prod' and public_exposure == 1"
    action: "BLOCK"
    reason: "Public exposure is strictly forbidden in Production regardless of AI risk score."

  - name: "Critical Threat Pattern"
    condition: "mitre_tactic_score > 0.8"
    action: "BLOCK"
    reason: "MITRE Tactic score exceeds the safety threshold for automated approval."

  - name: "Encryption Requirement"
    condition: "encryption_disabled == 1"
    action: "BLOCK"
    reason: "Corporate policy requires encryption to be enabled for all deployments."